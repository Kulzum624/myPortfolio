<section #heroSection id="hero" class="hero-section min-h-screen w-full px-4 md:px-10 lg:px-16 py-16 lg:py-20
         bg-gradient-to-t from-lime-600/50 via-lime-700/50 to-lime-950/40 dark:from-gray-900 dark:via-gray-800 dark:to-black
         text-white relative overflow-visible">

  <app-wave-background class="z-0"></app-wave-background>


  <!-- Avatar Layer (centered, fullscreen, no cropping) -->
  <div class="avatar-layer pointer-events-none">
    <div #avatarContainer class="hero-avatar-container"></div>
  </div>

  <div class="hero-content
         relative z-40 w-full mx-auto
         min-h-[65vh]
         grid
         grid-cols-1
         md:grid-cols-2
         xl:grid-cols-[minmax(250px,1fr)_minmax(320px,1.25fr)_minmax(250px,1fr)]
         gap-6 xl:gap-10
         items-center
         text-gray-950 dark:text-white">

    <!-- Left hero -->
    <div class="order-1 xl:order-1 text-center space-y-4 self-center">
      <p class="text-sm uppercase tracking-[0.35rem] text-gray-600 dark:text-gray-300">Hi, I'm</p>
      <h1 class="text-2xl sm:text-3xl md:text-4xl xl:text-5xl font-bold leading-tight">
        Kulzum
        <span class="text-green-900 dark:text-yellow-300 font-[babylonica]">
          Mujtaba
        </span>
      </h1>
      <p class="text-sm sm:text-base md:text-lg xl:text-xl text-gray-800 dark:text-gray-100">
        Front-End Developer · AI & ML Enthusiast
      </p>
    </div>

    <!-- Empty middle column (avatar auto in background) -->
    <div class="hidden xl:block order-2"></div>

    <!-- Right hero -->
    <div class="order-2 xl:order-3 text-center space-y-4 self-center">
      <p class="uppercase tracking-[0.5rem] text-sm text-gray-700 dark:text-gray-400">Front-end developer</p>
      <h2 class="text-2xl sm:text-3xl md:text-4xl xl:text-5xl font-bold leading-tight">
        &lt;coder&gt;
      </h2>
      <p class="text-lg text-gray-700 dark:text-gray-200">
        Clean, elegant and performant code focused on delightful human experiences.
      </p>
    </div>
  </div>
</section>
