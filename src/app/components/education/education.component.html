<section id="education" class="relative min-h-screen py-24 px-4 sm:px-8 md:px-16 lg:px-24 overflow-hidden
    bg-gradient-to-b from-white via-indigo-50/20 to-white dark:from-gray-950 dark:via-gray-900 dark:to-gray-950 dark:text-gray-100">
    
    <!-- Decorative background glow spheres -->
    <div class="absolute top-1/4 left-1/10 w-96 h-96 bg-lime-400/10 dark:bg-indigo-500/5 rounded-full blur-[120px] pointer-events-none"></div>
    <div class="absolute bottom-1/4 right-1/10 w-96 h-96 bg-emerald-400/10 dark:bg-purple-500/5 rounded-full blur-[120px] pointer-events-none"></div>

    <div class="text-center mb-20 relative z-10" data-aos="fade-up" data-aos-once="true">
        <h2 class="text-4xl md:text-5xl lg:text-6xl font-heading font-bold mb-4 tracking-tight">
            My <span class="bg-gradient-to-r from-lime-600 to-emerald-500 dark:from-indigo-400 dark:to-purple-400 bg-clip-text text-transparent">Education</span>
        </h2>
        <p class="text-gray-500 dark:text-gray-400 text-lg max-w-2xl mx-auto font-body">
            A chronicle of my academic journey, milestones, and achievements.
        </p>
    </div>

    <!-- Timeline Wrapper -->
    <div class="relative max-w-6xl mx-auto z-10">
        
        <!-- Center vertical line (hidden on mobile, centered on md+) -->
        <div class="absolute left-4 md:left-1/2 top-0 bottom-0 w-1 bg-gradient-to-b from-lime-400 via-emerald-500 to-lime-300 dark:from-indigo-500 dark:via-purple-500 dark:to-pink-500 transform md:-translate-x-1/2 rounded-full opacity-60"></div>

        <!-- Timeline Items -->
        <div class="space-y-16">
            <div *ngFor="let edu of educationList; let i = index; trackBy: trackById" 
                 class="relative flex flex-col md:flex-row items-start md:items-center"
                 [ngClass]="{
                   'md:flex-row-reverse': i % 2 !== 0
                 }">
                 
                <!-- Timeline Dot (pulsing) -->
                <div class="absolute left-4 md:left-1/2 w-6 h-6 rounded-full bg-white dark:bg-gray-900 border-4 border-lime-500 dark:border-indigo-500 transform -translate-x-1/2 z-20 flex items-center justify-center">
                    <span class="w-2.5 h-2.5 rounded-full bg-lime-500 dark:bg-indigo-500 animate-ping absolute"></span>
                    <span class="w-2 h-2 rounded-full bg-lime-500 dark:bg-indigo-500"></span>
                </div>

                <!-- Spacer to push card to correct side on desktop -->
                <div class="hidden md:block w-1/2"></div>

                <!-- 3D Card Wrapper -->
                <div class="edu-card-wrapper w-full md:w-[calc(50%-2rem)] pl-12 md:pl-0 pr-0 md:pr-8"
                     [ngClass]="{
                       'md:pl-8 md:pr-0': i % 2 !== 0,
                       'left-side': i % 2 === 0,
                       'right-side': i % 2 !== 0
                     }">
                    
                    <!-- 3D Perspective Card Container -->
                    <div class="edu-card-3d group">
                        
                        <!-- Dynamic Border & Glow Effect -->
                        <div class="absolute -inset-px rounded-2xl bg-gradient-to-r from-lime-500 to-emerald-400 dark:from-indigo-500 dark:to-purple-500 opacity-20 group-hover:opacity-100 blur-[2px] group-hover:blur-[6px] transition-all duration-700"></div>

                        <!-- Inner Card Body (Glassmorphism) -->
                        <div class="relative bg-white/70 dark:bg-gray-900/80 backdrop-blur-md rounded-2xl p-6 sm:p-8 border border-gray-200/50 dark:border-gray-800/80 shadow-lg group-hover:shadow-[0_20px_50px_rgba(0,0,0,0.15)] dark:group-hover:shadow-[0_20px_50px_rgba(99,102,241,0.15)] transition-all duration-500 overflow-hidden transform-gpu">
                            
                            <!-- Floating Background Grid Decoration -->
                            <div class="absolute -right-10 -bottom-10 w-40 h-40 opacity-[0.03] dark:opacity-[0.05] pointer-events-none">
                                <svg width="100%" height="100%" fill="none" xmlns="http://www.w3.org/2000/svg">
                                    <pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse">
                                        <path d="M 20 0 L 0 0 0 20" stroke="currentColor" stroke-width="1.5"/>
                                    </pattern>
                                    <rect width="100%" height="100%" fill="url(#grid)"/>
                                </svg>
                            </div>

                            <!-- Year Badge and Graduation Icon Header -->
                            <div class="flex items-center justify-between gap-4 mb-4">
                                <span class="px-4 py-1.5 rounded-full text-xs font-semibold uppercase tracking-wider bg-lime-100 text-lime-800 dark:bg-indigo-950/80 dark:text-indigo-300 border border-lime-200/30 dark:border-indigo-500/20 font-body">
                                    {{ edu.startYear }} — {{ edu.endYear }}
                                </span>
                                <div class="w-10 h-10 rounded-xl bg-gradient-to-tr from-lime-500 to-emerald-500 dark:from-indigo-500 dark:to-purple-500 flex items-center justify-center text-white shadow-md shadow-lime-500/20 dark:shadow-indigo-500/20 transform-gpu group-hover:rotate-12 transition-transform duration-300">
                                    <i class="fa-solid fa-graduation-cap text-lg"></i>
                                </div>
                            </div>

                            <!-- Degree / Field -->
                            <h3 class="text-xl sm:text-2xl font-heading font-bold text-gray-900 dark:text-white group-hover:text-lime-600 dark:group-hover:text-indigo-400 transition-colors duration-300 mb-1">
                                {{ edu.degree }}
                            </h3>

                            <!-- Institute -->
                            <h4 class="text-md sm:text-lg font-heading font-semibold text-gray-700 dark:text-gray-300 mb-3 flex items-center gap-2">
                                <i class="fa-solid fa-school text-sm text-lime-500 dark:text-indigo-400"></i>
                                <span>{{ edu.institute }}</span>
                            </h4>

                            <!-- Description -->
                            <p class="text-sm sm:text-base text-gray-600 dark:text-gray-400 font-body leading-relaxed text-justify">
                                {{ edu.description }}
                            </p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>
