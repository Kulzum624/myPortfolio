<!-- <p>navbar works!</p> -->
<div class="fixed inset-x-0 top-3 z-50 flex justify-center">

    <div class="relative w-[80%]">

        <nav class="fixed inset-x-0 top-3 mx-auto w-[80%] z-50
                    bg-slate-400/30 dark:bg-gray-900/70
                    backdrop-blur-xl
                    border border-slate-600/40 dark:border-white/[0.08]
                    rounded-full shadow-lg dark:shadow-black/40"
            data-aos="fade-down">

            <div class="max-w-7xl mx-auto px-6 flex justify-between items-center h-16 relative">

                <!-- LOGO -->
                <div class="font-heading text-2xl font-bold bg-gradient-to-r from-lime-600 to-emerald-500 dark:from-indigo-400 dark:to-purple-400 bg-clip-text text-transparent tracking-wide">
                    &lt;Kulzum /&gt;
                </div>

                <!-- NAV-LINKS -->
                <ul class="hidden md:flex gap-8 text-gray-800 dark:text-gray-300 text-md font-medium">
                    <li><button (click)="scrollTo('hero')"
                            class="nav-link hover:text-lime-600 dark:hover:text-indigo-400 transition-colors duration-300">Hero</button></li>
                    <li><button (click)="scrollTo('skills')"
                            class="nav-link hover:text-lime-600 dark:hover:text-indigo-400 transition-colors duration-300">Skills</button></li>
                    <li><button (click)="scrollTo('projects')"
                            class="nav-link hover:text-lime-600 dark:hover:text-indigo-400 transition-colors duration-300">Projects</button></li>
                    <li><button (click)="scrollTo('contact')"
                            class="nav-link hover:text-lime-600 dark:hover:text-indigo-400 transition-colors duration-300">Contact</button></li>
                </ul>

                <!-- RIGHT SIDE: clock + toggle -->
                <div class="flex items-center gap-5">
                    <p class="clock w-[80px] font-body text-gray-800 dark:text-gray-400 hidden sm:block text-sm tabular-nums">
                        {{currentTime}}</p>

                    <!-- THEME TOGGLE
                         Structure: label wraps input + track + thumb as siblings so
                         Tailwind peer-* selectors work correctly. -->
                    <label class="relative inline-block w-16 h-9 cursor-pointer">
                        <input type="checkbox" class="sr-only peer" [checked]="isDark" (change)="toggleTheme($event)" />

                        <!-- Track (sibling of input → peer selectors work) -->
                        <span class="absolute inset-0 rounded-full
                                     bg-lime-600/50 dark:bg-gray-800/80
                                     border border-slate-600/40 dark:border-white/10
                                     peer-checked:bg-indigo-600 dark:peer-checked:bg-indigo-600
                                     transition-colors duration-500">
                        </span>

                        <!-- Thumb (sibling of input → peer selectors work) -->
                        <span class="absolute top-1 left-1 w-7 h-7 rounded-full
                                     bg-white shadow-md shadow-black/20
                                     flex items-center justify-center
                                     transition-transform duration-500
                                     peer-checked:translate-x-7">

                            <!-- Sun — light mode -->
                            <svg *ngIf="!isDark" class="w-4 h-4 text-lime-600"
                                xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor">
                                <path d="M12 2a1 1 0 011 1v1a1 1 0 01-2 0V3a1 1 0 011-1zm0 16a1 1 0 011 1v1a1 1 0 01-2 0v-1a1 1 0 011-1zm9-5a1 1 0 010 2h-1a1 1 0 010-2h1zM4 12a1 1 0 010 2H3a1 1 0 010-2h1zm14.95-6.95a1 1 0 010 1.414l-.707.707a1 1 0 01-1.414-1.414l.707-.707a1 1 0 011.414 0zM6.757 17.243a1 1 0 010 1.414l-.707.707a1 1 0 01-1.414-1.414l.707-.707a1 1 0 011.414 0zM18.95 17.243a1 1 0 01-1.414 1.414l-.707-.707a1 1 0 011.414-1.414l.707.707zM6.757 6.757A1 1 0 015.343 5.343l.707-.707A1 1 0 017.464 6.05l-.707.707zM12 7a5 5 0 110 10A5 5 0 0112 7z"/>
                            </svg>

                            <!-- Moon — dark mode -->
                            <svg *ngIf="isDark" class="w-4 h-4 text-indigo-400"
                                xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor">
                                <path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/>
                            </svg>
                        </span>
                    </label>
                </div>
            </div>
        </nav>
    </div>
</div>
