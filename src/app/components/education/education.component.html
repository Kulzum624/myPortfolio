<section id="education" class="relative min-h-screen py-20 px-8 md:px-16 lg:px-24 
    bg-gradient-to-b from-white to-indigo-50 dark:from-gray-950 dark:to-gray-900 dark:text-gray-100">

    <div class="text-center mb-12" data-aos="fade-up" data-aos-once="true">
        <h2 class="text-4xl md:text-5xl font-bold mb-4">
            My <span class="text-lime-500 dark:text-indigo-400"> Education </span>
        </h2>
        <p class="text-gray-500 dark:text-gray-400 text-lg">
            A summary of my academic milestones and achievements.
        </p>
    </div>

    <div class="relative border-l-4 border-lime-500 dark:border-indigo-500 ml-6 space-y-12">

        <div *ngFor="let edu of educationList" data-aos="fade-up" data-aos-duration="300" data-aos-once="true">
            
            <!-- Timeline Dot -->
            <div class="absolute -left-[10px] top-2 w-5 h-5 bg-lime-300 dark:bg-indigo-500 
                rounded-full border-4 border-white dark:border-gray-200"></div>

            <!-- Optimized Card -->
            <div class="relative w-full max-w-[1000px] min-h-[200px] flex justify-start items-center 
                border border-gray-200 dark:border-gray-700 rounded-xl p-6 
                bg-gradient-to-tr from-white/60 to-gray-50/30 dark:from-gray-800 dark:to-gray-900
                shadow-md dark:shadow-none backdrop-blur-sm
                transition-transform duration-300 hover:scale-[1.02] will-change-transform">

                <!-- Soft Glow (only hover, lightweight) -->
                <div class="absolute top-0 left-6 w-[75%] h-full rounded-lg 
                    bg-gradient-to-l from-[#53EDBA]/40 via-[#6CD99A]/30 to-[#77BF79]/20
                    dark:from-[#4F46E5]/40 dark:via-[#7C3AED]/30 dark:to-[#1E1B4B]/30
                    opacity-0 group-hover:opacity-100 transition-opacity duration-500"></div>

                <!-- Content -->
                <div class="relative z-10 space-y-1">
                    <h3 class="text-xl font-bold text-gray-800 dark:text-white">{{ edu.degree }}</h3>
                    <h4 class="text-md font-semibold text-gray-700 dark:text-gray-300">{{ edu.institute }}</h4>
                    <p class="text-sm text-gray-500 dark:text-gray-400">{{ edu.startYear }} - {{ edu.endYear }}</p>
                    <p class="text-gray-600 dark:text-gray-300">{{ edu.description }}</p>
                </div>
            </div>
        </div>
    </div>
</section>
