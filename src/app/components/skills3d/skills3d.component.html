<div class="w-full h-[520px] md:h-[640px] lg:h-[720px] relative overflow-hidden bg-gradient-to-t from-lime-800/50 to-lime-600/50 dark:from-gray-800 dark:to-gray-900">
    <canvas #canvas class=" absolute w-full h-full z-10"></canvas>
    
    <div class="text-center mb-12 z-30" data-aos="fade-up">
        <h2 class="text-4xl md:text-5xl font-bold mb-4">
            My <span class="text-lime-500 dark:text-indigo-400">Skills</span>
        </h2>
        <p class="text-gray-500 dark:text-gray-400 text-lg">
            Tools and technologies I Love Working With.
        </p>
    </div>
    
    <!-- Scroll-to-Zoom Container -->
    <div class="absolute top-60 right-4 flex flex-col items-center gap-2 z-20">

        <!-- Label -->
        <p class="text-black dark:text-white text-lg font-semibold">Scroll to Zoom</p>

        <!-- SCROLL BAR (Tailwind Styled) -->
        <div class="h-40 w-6 overflow-y-auto rounded-xl border border-gray-300 bg-white shadow-md
                    [&::-webkit-scrollbar]:w-2
                    [&::-webkit-scrollbar-track]:rounded-full
                    [&::-webkit-scrollbar-track]:bg-gray-200
                    [&::-webkit-scrollbar-thumb]:rounded-full
                    [&::-webkit-scrollbar-thumb]:bg-lime-800/50
                    dark:[&::-webkit-scrollbar-track]:bg-neutral-700
                    dark:[&::-webkit-scrollbar-thumb]:bg-neutral-500"
             (scroll)="onZoomScroll($event)">

            <!-- Scrollable content (needed to make scrollbar appear) -->
            <div class="h-[600px]"></div>
        </div>
    </div>
</div>
