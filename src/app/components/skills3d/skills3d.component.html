<div id="skills"
    class="py-20 w-full h-[520px] md:h-[640px] lg:h-[720px] relative overflow-hidden bg-gradient-to-t from-lime-800/50 to-lime-600/50 dark:from-gray-800 dark:to-gray-900">
    <canvas #canvas class=" absolute w-full h-full z-10"></canvas>

    <div class="text-center mb-12 z-30" data-aos="fade-up">
        <h2 class="text-4xl md:text-5xl font-bold mb-4 dark:text-white">
            My <span
                class="bg-gradient-to-r from-lime-600 to-emerald-500 dark:from-indigo-400 dark:to-purple-400 bg-clip-text text-transparent">Skills</span>
        </h2>
        <p class="text-gray-500 dark:text-gray-400 text-lg">
            Tools and technologies I Love Working With.
        </p>
    </div>

    <!-- Interactive Hints (Rotation & Horizontal Zoom) -->
    <div class="absolute bottom-4 right-4 sm:right-6 flex flex-col items-end gap-3 z-20 pointer-events-auto">
        <!-- Rotate Hint -->
        <div
            class="flex items-center gap-2 bg-white/20 dark:bg-black/40 backdrop-blur-md px-3.5 py-1.5 rounded-full border border-white/25 dark:border-white/10 text-gray-800 dark:text-gray-200 text-xs md:text-sm font-semibold shadow-sm select-none pointer-events-none">
            <i class="fa-solid fa-arrows-spin animate-spin text-lime-600 dark:text-indigo-400"
                style="animation-duration: 4s;"></i>
            <span>Select the avatar and move to rotate</span>
        </div>

        <!-- Zoom Hint -->
        <div
            class="flex items-center gap-2 bg-white/20 dark:bg-black/40 backdrop-blur-md px-3.5 py-1.5 rounded-full border border-white/25 dark:border-white/10 text-gray-800 dark:text-gray-200 text-xs md:text-sm font-semibold shadow-sm select-none pointer-events-none">
            <i class="fa-solid fa-arrows-left-right animate-pulse text-lime-600 dark:text-indigo-400"></i>
            <span>Scroll horizontally to zoom</span>
        </div>
    </div>
</div>
