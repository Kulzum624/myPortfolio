<section id="projects" class="min-h-screen py-20 px-8 md:px-16 lg:px-24 bg-gradient-to-b 
            from-indigo-50 to-white dark:from-gray-900 dark:to-gray-950 text-gray-900 dark:text-gray-100">
    <!-- title -->
    <div class="text-center mb-12" data-aos="fade-up">
        <h2 class="text-4xl md:text-5xl font-bold mb-4">
            Featured <span
                class="bg-gradient-to-r from-lime-600 to-emerald-500 dark:from-indigo-400 dark:to-purple-400 bg-clip-text text-transparent">Projects</span>
        </h2>
        <p class="text-gray-500 dark:text-gray-400 text-lg">
            A glimpse of my development & AI journey.
        </p>
    </div>

    <div class="grid gap-5 md:grid-cols-2 xl:grid-cols-3" data-aos="fade-up" data-aos-delay="100">
        @for (project of projects; track project.id) {
        <a [href]="project.url" target="_blank" rel="noopener noreferrer"
            class="project-card block group cursor-pointer p-2 rounded-[28px] bg-white dark:bg-gray-800/40 border border-gray-100 dark:border-white/5 hover:border-lime-200 dark:hover:border-lime-500/30 shadow-sm hover:shadow-xl dark:shadow-none dark:hover:shadow-[0_8px_30px_rgba(0,0,0,0.5)]">

            <!-- Image Frame -->
            <div class="relative w-full h-56 md:h-64 rounded-[20px] overflow-hidden bg-gray-100 dark:bg-gray-900">
                <img [src]="project.image" [alt]="project.title"
                    loading="lazy" decoding="async"
                    width="600" height="400"
                    class="w-full h-full object-cover transform group-hover:scale-105 transition-transform duration-700 ease-out will-change-transform">
                <!-- Subtle Image Overlay on Hover -->
                <div
                    class="absolute inset-0 bg-black/0 group-hover:bg-black/10 dark:group-hover:bg-black/30 transition-colors duration-500">
                </div>
            </div>

            <!-- Content Area -->
            <div class="px-4 pt-5 pb-3 flex items-center justify-between">
                <div>
                    <h3
                        class="text-xl font-semibold text-gray-800 dark:text-gray-100 tracking-tight transition-colors duration-300 group-hover:text-lime-600 dark:group-hover:text-indigo-400">
                        {{project.title}}
                    </h3>
                    <!-- Animated Underline -->
                    <div
                        class="h-[2px] w-0 bg-lime-500 dark:bg-indigo-400 mt-1 transition-[width] duration-500 ease-out group-hover:w-full">
                    </div>
                </div>

                <!-- Action Button -->
                <div
                    class="w-10 h-10 flex items-center justify-center rounded-full bg-gray-50 dark:bg-white/5 group-hover:bg-lime-500 dark:group-hover:bg-indigo-500 transition-[background-color,border-color] duration-500 shrink-0 border border-gray-200 dark:border-white/10 group-hover:border-transparent">
                    <i
                        class="fa-solid fa-arrow-right text-gray-400 dark:text-gray-400 group-hover:text-white -rotate-45 group-hover:rotate-0 transition-transform duration-500 ease-out"></i>
                </div>
            </div>
        </a>
        }
    </div>
</section>
